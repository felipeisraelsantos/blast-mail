services:
  app:
    build: .
    container_name: BlastMail_app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - ./docker/php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
    # ADICIONADO: Define o usuário do container para o usuário local
    user: "1001:1001"
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
    - mailpit
    extra_hosts:
      - "host.docker.internal:host-gateway"
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
    - "8025:8025"
    - "1025:1025"
